services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - vchat-data:/app/chroma_data
    env_file:
      - ./api/.env
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
      - DATABASE_URL=sqlite+aiosqlite:///./vchat.db
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  vchat-data:
  ollama-data:
